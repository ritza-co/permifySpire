server {
    bind_address = "0.0.0.0"
    bind_port = "8081"
    socket_path = "/opt/spire/sockets/registration.sock" # for initialise to call from CLI to server
    trust_domain = "example.org"
    data_dir = "/var/lib/spire"
    log_level = "INFO"
}

plugins {
    DataStore "sql" {
        plugin_data {
            database_type = "sqlite3"
            connection_string = "/var/lib/spire/store.sqlite3"
        }
    }

    NodeAttestor "join_token" {
        plugin_data {
            allow_list = ["*"]
        }
    }

    KeyManager "memory" {
        plugin_data = {}
    }
}